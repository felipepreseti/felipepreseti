<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="FP monogram">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfcfcf"/>
    </linearGradient>
    <radialGradient id="inner" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <circle cx="110" cy="110" r="98" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="110" cy="110" r="95" fill="none" stroke="#0f0f0f" stroke-width="1" stroke-dasharray="2 4"/>

  <path d="M110,22 L198,110 L110,198 L22,110 Z" fill="url(#inner)" stroke="url(#mark)" stroke-width="1.5"/>
  <path d="M110,38 L182,110 L110,182 L38,110 Z" fill="none" stroke="#2a2a2a" stroke-width="0.6"/>

  <text x="110" y="128" text-anchor="middle"
    font-family="'Helvetica Neue', 'Inter', Helvetica, Arial, sans-serif"
    font-size="52" font-weight="900" letter-spacing="4"
    fill="#ffffff">FP</text>

  <g fill="#ffffff">
    <circle cx="110" cy="22" r="2.5">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="198" cy="110" r="2.5">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" begin="0.75s" repeatCount="indefinite"/>
    </circle>
    <circle cx="110" cy="198" r="2.5">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="22" cy="110" r="2.5">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" begin="2.25s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#3a3a3a" letter-spacing="2" text-anchor="middle">
    <text x="110" y="14" font-size="6">&#8212; EST &#183; MMXXV &#8212;</text>
    <text x="110" y="216" font-size="6">FELIPE &#183; PRESETI</text>
  </g>
</svg>
