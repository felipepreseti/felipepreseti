<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-label="Manifesto">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="0.5" stop-color="#000000"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.85">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="880" height="460" fill="url(#bg)"/>
  <rect width="880" height="460" fill="url(#vignette)"/>

  <rect x="44" y="44" width="792" height="372" fill="none" stroke="#1c1c1c" stroke-width="1"/>
  <rect x="56" y="56" width="768" height="348" fill="none" stroke="#141414" stroke-width="1"/>

  <g stroke="#3a3a3a" stroke-width="1" fill="none">
    <path d="M 44,68 L 44,44 L 68,44"/>
    <path d="M 812,44 L 836,44 L 836,68"/>
    <path d="M 44,392 L 44,416 L 68,416"/>
    <path d="M 812,416 L 836,416 L 836,392"/>
  </g>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#5a5a5a" letter-spacing="3">
    <text x="72" y="78">MANIFESTO &#183; V</text>
    <text x="808" y="78" text-anchor="end">FP &#183; MMXXV</text>
  </g>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="9" fill="#3a3a3a" letter-spacing="6" text-anchor="middle">
    <text x="440" y="106">&#8212; ARTICLE I &#8212;</text>
  </g>

  <line x1="380" y1="118" x2="500" y2="118" stroke="url(#rule)" stroke-width="1"/>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#ffffff" text-anchor="middle">
    <text x="440" y="172" font-size="24" font-style="italic" font-weight="400" letter-spacing="0.5">we don&#8217;t build for an exit.</text>
    <text x="440" y="206" font-size="24" font-style="italic" font-weight="400" letter-spacing="0.5">we build to last decades.</text>
  </g>

  <g transform="translate(440, 256)">
    <line x1="-90" y1="0" x2="-14" y2="0" stroke="url(#rule)" stroke-width="1"/>
    <line x1="14" y1="0" x2="90" y2="0" stroke="url(#rule)" stroke-width="1"/>
    <path d="M0,-5 L5,0 L0,5 L-5,0 Z" fill="#ffffff" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.35;0.85" dur="3.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#ffffff" text-anchor="middle">
    <text x="440" y="306" font-size="24" font-style="italic" font-weight="400" letter-spacing="0.5">if it&#8217;s worth building,</text>
    <text x="440" y="340" font-size="24" font-style="italic" font-weight="400" letter-spacing="0.5">it&#8217;s worth building to last.</text>
  </g>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="8" fill="#3a3a3a" letter-spacing="3" text-anchor="middle">
    <text x="440" y="382">&#8212; signed &#183; F.P. &#8212;</text>
  </g>
</svg>
