<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Felipe Preseti">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="0.5" stop-color="#080808"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#vignette)"/>

  <rect x="40" y="40" width="1120" height="260" fill="none" stroke="#1a1a1a" stroke-width="1"/>

  <g stroke="#3a3a3a" stroke-width="1" fill="none">
    <path d="M 40,60 L 40,40 L 60,40"/>
    <path d="M 1140,40 L 1160,40 L 1160,60"/>
    <path d="M 40,280 L 40,300 L 60,300"/>
    <path d="M 1140,300 L 1160,300 L 1160,280"/>
  </g>

  <text x="60" y="75" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#4a4a4a" letter-spacing="3">DOSSIER · 001</text>
  <text x="1140" y="75" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#4a4a4a" letter-spacing="3">SP · MMXXV</text>

  <g transform="translate(600, 110)">
    <path d="M0,-7 L7,0 L0,7 L-7,0 Z" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.8s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.4;1" begin="2.5s" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <text x="600" y="200" text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="56" font-weight="800" letter-spacing="14"
    fill="#ffffff" opacity="0">
    FELIPE PRESETI
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="1s" fill="freeze"/>
  </text>

  <line x1="450" y1="225" x2="750" y2="225" stroke="url(#lineGrad)" stroke-width="1" stroke-dasharray="300" stroke-dashoffset="300">
    <animate attributeName="stroke-dashoffset" from="300" to="0" begin="1.2s" dur="1.5s" fill="freeze"/>
  </line>

  <text x="600" y="255" text-anchor="middle"
    font-family="ui-monospace, 'SF Mono', Menlo, monospace"
    font-size="12" font-weight="500" letter-spacing="6"
    fill="#a8a8a8" opacity="0">
    builder · operator · founder
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="1s" fill="freeze"/>
  </text>
</svg>
