# ──────────────────────────────────────────────────────────────────
#  github contribution snake animation
#
#  setup (3 passos):
#    1. salve este arquivo em:
#       .github/workflows/snake.yml
#       no repo felipepreseti/felipepreseti
#    2. faça commit/push pra branch main
#    3. aba Actions > "generate snake animation" > Run workflow
#
#  o resultado é gerado em uma branch chamada `output` automaticamente
#  e referenciado no README via:
#    https://raw.githubusercontent.com/felipepreseti/felipepreseti/output/snake-dark.svg
#
#  depois de configurado, a cobra atualiza sozinha a cada 24h.
# ──────────────────────────────────────────────────────────────────

name: generate snake animation

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=ffffff&color_dots=0a0a0a,1f1f1f,2a2a2a,353535,404040

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
